<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeder 계정 삭제</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }

        h1 {
            color: #7C3AED;
        }

        .form-group {
            margin: 20px 0;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #EF4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #DC2626;
        }
    </style>
</head>

<body>
    <h1>🗑️ Feeder 계정 삭제</h1>
    <p>계정 삭제를 요청하시면 일주일 내에 처리됩니다.</p>
    <p>신청 시점 이후 48시간 내 접속 시 해당 요청은 처리되지 않습니다.</p>
    <p>삭제되는 데이터: 프로필, 게시물, 채팅, Shots 등 모든 데이터</p>

    <form action="https://formspree.io/f/mnjojyon" method="POST">
        <div class="form-group">
            <input type="tel" name="phone" placeholder="가입한 전화번호" required>
        </div>
        <div class="form-group">
            <input type="text" name="nickname" placeholder="사용 중인 닉네임" required>
        </div>
        <div class="form-group">
            <input type="text" name="reason" placeholder="삭제 사유 (선택)">
        </div>
        <button type="submit">계정 삭제 요청</button>
    </form>

    <p style="margin-top: 30px; color: #666; font-size: 14px;">
        문의: feederadmin@gmail.com
    </p>
</body>

</html>
